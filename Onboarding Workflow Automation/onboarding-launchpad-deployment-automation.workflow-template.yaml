    upload_dashboard:
      name: upload_dashboard
      input:
        script: "import { execution } from '@dynatrace-sdk/automation-utils';\nimport\
          \ { documentsClient } from '@dynatrace-sdk/client-document';\n\nexport default\
          \ async function ({ executionId }) {\n\n  //\n  // Load workflow context\n\
          \  //\n  const ex = await execution(executionId);\n\n  //\n  // JSON files\
          \ downloaded from GitHub\n  //\n  const githubFiles = await ex.result(\"\
          fetch_dashboard_github\");\n  const files = githubFiles.files;\n\n  //\n\
          \  // Document metadata\n  //\n  const documents = [\n    { file: \"Launchpad\
          \ Tracker.json\", name: \"Onboarding - Launchpad Tracker\", id: \"onboarding-admin-tracking-k5294kxd5l\"\
          \ }\n  ];\n\n  //\n  // Upload each document\n  //\n  const results = [];\n\
          \n  for (const doc of documents) {\n\n    const jsonData = files[doc.file];\n\
          \n    if (!jsonData) {\n      throw new Error(`Missing JSON data for ${doc.file}`);\n\
          \    }\n\n    try {\n\n      const response = await documentsClient.createDocument({\n\
          \        body: {\n          name: doc.name,\n          type: \"dashboard\"\
          ,\n          id: doc.id,\n          content: new Blob(\n            [JSON.stringify(jsonData,\
          \ null, 2)],\n            { type: \"application/json\" }\n          )\n\
          \        }\n      });\n\n      results.push({\n        dashboard: doc.name,\n\
          \        id: doc.id,\n        status: \"uploaded\",\n        response\n\
          \      });\n\n    } catch (error) {\n\n      results.push({\n        dashboard:\
          \ doc.name,\n        id: doc.id,\n        status: \"failed\",\n        error:\
          \ error.message\n      });\n\n      throw new Error(`Failed to upload ${doc.name}:\
          \ ${error.message}`);\n    }\n  }\n\n  //\n  // Return summary\n  //\n \
          \ return {\n    uploaded: results\n  };\n\n}"
      action: dynatrace.automations:run-javascript
      position:
        x: -1
        y: 2
      conditions:
        states:
          fetch_dashboard_github: OK
      description: Run custom JavaScript code.
      predecessors:
      - fetch_dashboard_github
